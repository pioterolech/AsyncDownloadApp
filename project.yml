name: AsyncDownload
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DownloadManager:
    path: Packages/DownloadManager

targets:
  AsyncDownloadApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AsyncDownloadApp
    dependencies:
      - package: DownloadManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.AsyncDownloadApp
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: AsyncDownloadApp/Info.plist
    info:
      path: AsyncDownloadApp/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
