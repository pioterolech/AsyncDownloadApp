name: AsyncDownload
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DownloadManager:
    path: Packages/DownloadManager

targets:
  AsyncDownloadApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AsyncDownloadApp
    dependencies:
      - package: DownloadManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.AsyncDownloadApp
        SWIFT_VERSION: "6.1"
        INFOPLIST_FILE: AsyncDownloadApp/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Regenerate Mocks
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          cd "$SRCROOT/Packages/DownloadManager"
          if which mint > /dev/null; then
            mint run sourcery --disableCache
          else
            echo "warning: Mint not installed, skipping mock generation"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: AsyncDownloadApp/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
