name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests with coverage
        run: |
          cd Packages/DownloadManager
          swift test --enable-code-coverage

      - name: Export coverage report
        run: |
          cd Packages/DownloadManager
          BIN_PATH=$(swift build --show-bin-path 2>/dev/null)
          BINARY="$BIN_PATH/DownloadManagerPackageTests.xctest/Contents/MacOS/DownloadManagerPackageTests"
          PROFDATA=$(find .build -name "*.profdata" | head -1)
          llvm-cov export \
            "$BINARY" \
            --instr-profile="$PROFDATA" \
            --format=lcov \
            --ignore-filename-regex=".build|Tests" \
            > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: Packages/DownloadManager/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
